
    <!DOCTYPE html>
    <html>
    <head>
        <title>Clean Pitch - No Echo & No Breaks</title>
        <style>
            body { background: #070a13; color: #f8fafc; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
            .card { background: #111827; padding: 40px; border-radius: 32px; width: 420px; border: 1px solid #1f2937; box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
            h2 { color: #10b981; margin: 0 0 5px 0; }
            .status { font-size: 0.8em; color: #6b7280; margin-bottom: 25px; }
            .slider-group { background: #1f2937; padding: 18px; border-radius: 20px; margin-bottom: 12px; }
            .label-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: 600; font-size: 0.85em; }
            input[type=range] { width: 100%; accent-color: #10b981; cursor: pointer; }
            .val { color: #10b981; }
            button { background: #10b981; border: none; padding: 18px; border-radius: 14px; color: #064e3b; font-weight: 800; cursor: pointer; width: 100%; margin-top: 20px; }
            .footer-note { font-size: 0.7em; color: #4b5563; margin-top: 20px; text-align: center; }
        </style>
    </head>
    <body>
        <div class="card">
            <h2>Clean Pitch</h2>
            <p class="status">Noise Gate + Oversampled Buffer</p>
            
            <div class="slider-group">
                <div class="label-row"><span>Pitch Shift</span> <span id="pVal" class="val">0.0 Semitones</span></div>
                <input type="range" id="pitch" min="-12" max="12" step="0.1" value="0">
            </div>

            <div class="slider-group">
                <div class="label-row"><span>Noise Gate (Echo Kill)</span> <span id="gVal" class="val">-45 dB</span></div>
                <input type="range" id="gate" min="-100" max="-20" step="1" value="-45">
            </div>

            <div class="slider-group">
                <div class="label-row"><span>Output Volume</span> <span id="vVal" class="val">100%</span></div>
                <input type="range" id="volume" min="0" max="150" step="1" value="100">
            </div>

            <button id="btn">Activate Clean Audio</button>

            <div class="footer-note">
                • Increased Buffer (8192) for Stability<br>
                • Real-time Noise Gate to suppress feedback<br>
                • Linear Cross-fading to eliminate "Breaks"
            </div>
        </div>

        <script>
            let audioCtx, mic, gateNode, processor, gainNode, isActive = false;
            let pitchShift = 1.0;

            const btn = document.getElementById('btn');
            const pIn = document.getElementById('pitch');
            const gIn = document.getElementById('gate');
            const vIn = document.getElementById('volume');

            pIn.oninput = (e) => {
                const s = parseFloat(e.target.value);
                document.getElementById('pVal').textContent = (s > 0 ? "+" + s : s) + " Semitones";
                pitchShift = Math.pow(2, s / 12);
            };

            gIn.oninput = (e) => {
                const db = e.target.value;
                document.getElementById('gVal').textContent = db + " dB";
                // We simulate a gate using an Expander logic or Threshold check in processor
            };

            vIn.oninput = (e) => {
                const v = e.target.value;
                document.getElementById('vVal').textContent = v + "%";
                if (gainNode) gainNode.gain.setTargetAtTime(v / 100, audioCtx.currentTime, 0.05);
            };

            async function init() {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: false } 
                    });
                    
                    mic = audioCtx.createMediaStreamSource(stream);
                    
                    // 1. Noise Gate (Dynamics Compressor used as an Expander)
                    gateNode = audioCtx.createDynamicsCompressor();
                    gateNode.threshold.value = gIn.value;
                    gateNode.ratio.value = 20; // High ratio to kill background
                    
                    // 2. High Stability Processor (Increased Buffer to 8192 to prevent breaks)
                    processor = audioCtx.createScriptProcessor(8192, 1, 1);
                    
                    gainNode = audioCtx.createGain();
                    gainNode.gain.value = vIn.value / 100;

                    let hannWindow = new Float32Array(8192);
                    for (let i = 0; i < 8192; i++) hannWindow[i] = 0.5 * (1 - Math.cos(2 * Math.PI * i / 8191));

                    processor.onaudioprocess = (e) => {
                        const input = e.inputBuffer.getChannelData(0);
                        const output = e.outputBuffer.getChannelData(0);
                        
                        // Simple Gate Logic: Check input volume
                        let sum = 0;
                        for(let i=0; i<input.length; i++) sum += input[i]*input[i];
                        let rms = Math.sqrt(sum/input.length);
                        let db = 20 * Math.log10(rms);

                        if (db < gIn.value) {
                            output.fill(0); // Mute if below gate threshold
                            return;
                        }

                        // Pitch Shift with Linear Smoothing
                        for (let i = 0; i < input.length; i++) {
                            let phase = i * pitchShift;
                            let i0 = Math.floor(phase) % input.length;
                            let i1 = (i0 + 1) % input.length;
                            let frac = phase - Math.floor(phase);
                            output[i] = ((1 - frac) * input[i0] + frac * input[i1]) * hannWindow[i]; 
                        }
                    };

                    mic.connect(gateNode);
                    gateNode.connect(processor);
                    processor.connect(gainNode);
                    gainNode.connect(audioCtx.destination);

                    btn.textContent = "Stop Session";
                    btn.style.background = "#ef4444";
                    isActive = true;
                } catch (err) { alert("Mic access required."); }
            }

            btn.onclick = () => { if (!isActive) init(); else location.reload(); };
        </script>
    </body>
    </html>
