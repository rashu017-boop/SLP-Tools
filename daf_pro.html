
    <!DOCTYPE html>
    <html>
    <head>
        <title>DAF Pro - Delay & Volume</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>
    <body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #0f172a; color: #f8fafc; font-family: system-ui, sans-serif;">
        <div style="text-align: center; background: #1e293b; padding: 40px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); width: 380px; border: 1px solid #334155;">
            <h2 style="margin-top: 0; color: #38bdf8; letter-spacing: -0.025em;">DAF Tool Pro</h2>
            <p style="font-size: 0.85em; color: #94a3b8; margin-bottom: 30px;">🎧 Use wired headphones for best results.</p>
            
            <div style="margin-bottom: 25px; text-align: left;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <label style="font-weight: 600; font-size: 0.9em;">Delay Time</label>
                    <span id="delayDisplay" style="color: #38bdf8; font-weight: bold;">150 ms</span>
                </div>
                <input type="range" id="delayRange" min="0" max="1000" step="10" value="150" style="width: 100%; accent-color: #38bdf8;">
            </div>

            <div style="margin-bottom: 35px; text-align: left;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <label style="font-weight: 600; font-size: 0.9em;">Feedback Volume</label>
                    <span id="volumeDisplay" style="color: #38bdf8; font-weight: bold;">100%</span>
                </div>
                <input type="range" id="volumeRange" min="0" max="200" step="5" value="100" style="width: 100%; accent-color: #38bdf8;">
            </div>

            <button id="toggleBtn" style="width: 100%; padding: 16px; font-size: 1.1em; font-weight: bold; cursor: pointer; border-radius: 12px; border: none; background: #38bdf8; color: #0f172a; transition: all 0.2s ease;">
                Start Session
            </button>
            
            <div id="visualizer" style="margin-top: 25px; height: 4px; background: #334155; border-radius: 2px; overflow: hidden;">
                <div id="micLevel" style="height: 100%; width: 0%; background: #38bdf8; transition: width 0.1s ease;"></div>
            </div>
        </div>

        <script>
            let audioCtx = null;
            let delayNode = null;
            let gainNode = null;
            let microphone = null;
            let isActive = false;

            const toggleBtn = document.getElementById('toggleBtn');
            const delayRange = document.getElementById('delayRange');
            const delayDisplay = document.getElementById('delayDisplay');
            const volumeRange = document.getElementById('volumeRange');
            const volumeDisplay = document.getElementById('volumeDisplay');

            async function startDAF() {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        audio: { echoCancellation: false, noiseSuppression: false } 
                    });

                    microphone = audioCtx.createMediaStreamSource(stream);
                    delayNode = audioCtx.createDelay(2.0);
                    gainNode = audioCtx.createGain();
                    
                    // Initialize values
                    delayNode.delayTime.value = delayRange.value / 1000;
                    gainNode.gain.value = volumeRange.value / 100;

                    // Routing
                    microphone.connect(delayNode);
                    delayNode.connect(gainNode);
                    gainNode.connect(audioCtx.destination);

                    isActive = true;
                    updateUI();
                } catch (err) {
                    alert('Mic access denied. Please check browser permissions.');
                }
            }

            function stopDAF() {
                if (microphone) microphone.disconnect();
                isActive = false;
                updateUI();
            }

            function updateUI() {
                toggleBtn.textContent = isActive ? 'Stop Session' : 'Start Session';
                toggleBtn.style.background = isActive ? '#ef4444' : '#38bdf8';
            }

            toggleBtn.onclick = () => {
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                !isActive ? startDAF() : stopDAF();
            };

            delayRange.oninput = (e) => {
                const ms = e.target.value;
                delayDisplay.textContent = ms + " ms";
                if (delayNode) delayNode.delayTime.setTargetAtTime(ms / 1000, audioCtx.currentTime, 0.03);
            };

            volumeRange.oninput = (e) => {
                const vol = e.target.value;
                volumeDisplay.textContent = vol + "%";
                if (gainNode) gainNode.gain.setTargetAtTime(vol / 100, audioCtx.currentTime, 0.03);
            };
        </script>
    </body>
    </html>
